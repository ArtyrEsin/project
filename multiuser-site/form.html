<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Добавить проект — PortfolioHub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="container header-row">
      <div class="logo-block">
        <h1 class="logo-title">PortfolioHub</h1>
        <p class="logo-text">Добавление проекта</p>
      </div>
      <nav class="nav">
        <a href="index.html">Все проекты</a>
        <a href="form.html" class="active">Добавить проект</a>
        <a href="about.html">О платформе</a>
      </nav>
      <div class="user-area">
        <div id="userInfo" style="display:none">
          <div class="user-badge">
            <div class="avatar-dot" id="headerAvatar"></div>
            <span id="headerName"></span>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="storage.logout(); location.href='index.html'">Выйти</button>
        </div>
        <a id="loginBtn" href="index.html" class="btn btn-sm" style="display:none">Войти</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="page-box">
      <div id="authWarning" class="auth-warning" style="display:none">
        ⚠️ Нужно <a href="index.html">войти в аккаунт</a>, чтобы добавить проект.
      </div>
      <h2>Новый проект</h2>
      <p class="page-text">Заполни форму — проект появится в общей ленте.</p>
      <p class="author-text" id="authorLine" style="display:none"></p>

      <form id="projectForm" class="project-form" style="margin-top:20px">
        <div class="form-group">
          <label>Название проекта *</label>
          <input type="text" id="title" placeholder="Например: Сайт кафе">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Категория *</label>
            <input type="text" id="category" placeholder="Например: Landing Page">
          </div>
          <div class="form-group">
            <label>Дата *</label>
            <input type="date" id="date">
          </div>
        </div>
        <div class="form-group">
          <label>Описание *</label>
          <textarea id="description" placeholder="Кратко опиши проект — технологии, что получилось"></textarea>
        </div>
        <div class="form-group">
          <label>Ссылка (GitHub или сайт)</label>
          <input type="text" id="link" placeholder="https://github.com/...">
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="done">
          <label for="done">Отметить как завершённый</label>
        </div>
        <div class="form-buttons">
          <button type="submit" class="btn" id="submitBtn">Сохранить проект</button>
          <a href="index.html" class="btn btn-gray">На главную</a>
        </div>
      </form>
    </section>

    <section class="page-box" id="mySection" style="display:none">
      <h2>Мои проекты</h2>
      <div id="myProjectsList" class="projects-grid" style="margin-top:16px"></div>
    </section>
  </main>

  <div id="projectModal" class="project-modal-overlay" style="display:none" onclick="if(event.target===this)closeProjectModal()">
    <div class="project-modal">
      <div class="project-modal-header">
        <div class="project-modal-header-left">
          <span id="pm-status" class="project-status"></span>
          <h2 id="pm-title" style="margin-top:8px"></h2>
        </div>
        <button class="modal-close" onclick="closeProjectModal()" style="flex-shrink:0">✕</button>
      </div>
      <div class="project-modal-body">
        <div class="project-modal-meta">
          <div class="meta-item"><div class="meta-label">Категория</div><div class="meta-value" id="pm-category"></div></div>
          <div class="meta-item"><div class="meta-label">Дата</div><div class="meta-value" id="pm-date"></div></div>
        </div>
        <div class="project-modal-desc">
          <div class="meta-label">Описание проекта</div>
          <p id="pm-desc"></p>
        </div>
        <div id="pm-link-wrap" style="display:none">
          <a id="pm-link" class="project-modal-link" target="_blank" rel="noopener">🔗 <span id="pm-link-text"></span></a>
        </div>
        <div class="project-modal-author">
          <div class="author-avatar-lg" id="pm-avatar"></div>
          <div class="author-info"><div class="author-name" id="pm-author"></div><div class="author-sub">Автор проекта</div></div>
        </div>
      </div>
      <div class="project-modal-footer">
        <div id="pm-owner-btns" style="display:none; gap:8px">
          <button class="btn btn-ghost btn-sm" id="pm-toggle-btn">Сменить статус</button>
          <button class="btn btn-danger btn-sm" id="pm-delete-btn">Удалить</button>
        </div>
        <button class="btn btn-outline btn-sm" onclick="closeProjectModal()">Закрыть</button>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/form.js"></script>
</body>
</html>
